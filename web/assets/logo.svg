<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" role="img" aria-label="EIGAN">
  <defs>
    <linearGradient id="eiganGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#6c5ce7"/>
    </linearGradient>
    <style>
      /* Wordmark adaptável: escuro em fundo claro, claro em fundo escuro. */
      .word { fill: #16202e; }
      @media (prefers-color-scheme: dark) { .word { fill: #e6ecf5; } }
    </style>
  </defs>

  <!-- Emblema exclusivo do EIGAN: escudo hexagonal (Guardian) com uma constelação
       de rede comandada por um hub central (o agente de IA que orquestra),
       evocando avaliação autônoma. Guardian + Intelligent + Autonomous Assessment. -->
  <g transform="translate(8 6)">
    <path d="M30 0 L54 14 L54 42 L30 56 L6 42 L6 14 Z" fill="url(#eiganGrad)"/>
    <g stroke="#fff" stroke-width="2.4" stroke-linecap="round" opacity="0.92">
      <line x1="30" y1="28" x2="16" y2="15"/>
      <line x1="30" y1="28" x2="44" y2="15"/>
      <line x1="30" y1="28" x2="30" y2="45"/>
    </g>
    <g fill="#fff">
      <circle cx="16" cy="15" r="3.2"/>
      <circle cx="44" cy="15" r="3.2"/>
      <circle cx="30" cy="45" r="3.2"/>
    </g>
    <circle cx="30" cy="28" r="5.4" fill="#fff"/>
    <circle cx="30" cy="28" r="2.4" fill="url(#eiganGrad)"/>
  </g>

  <!-- Wordmark EIGAN (elemento único → renderiza igual em todo lugar). Emblema
       é o herói do gradiente; a palavra adapta ao tema. -->
  <text class="word" x="78" y="48" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif"
        font-size="37" font-weight="800" letter-spacing="2">EIGAN</text>
</svg>
