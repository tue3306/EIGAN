# Mapeamento INDICATIVO de findings (por CWE) a referências de conformidade.
# NÃO é atestação de conformidade — é um ponto de partida AUDITÁVEL, com a URL
# oficial de cada referência. O programa de compliance do time amplia este mapa.
# Regra anti-invenção (§5): cada referência aponta para a fonte oficial.
mappings:
  CWE-89:
    - {framework: "OWASP Top 10 2021", ref: "A03:2021 Injection", url: "https://owasp.org/Top10/A03_2021-Injection/"}
    - {framework: "OWASP ASVS", ref: "V5 Validation, Sanitization & Encoding", url: "https://owasp.org/www-project-application-security-verification-standard/"}
  CWE-79:
    - {framework: "OWASP Top 10 2021", ref: "A03:2021 Injection", url: "https://owasp.org/Top10/A03_2021-Injection/"}
  CWE-327:
    - {framework: "OWASP Top 10 2021", ref: "A02:2021 Cryptographic Failures", url: "https://owasp.org/Top10/A02_2021-Cryptographic_Failures/"}
    - {framework: "NIST", ref: "SP 800-52 Rev.2 (TLS)", url: "https://csrc.nist.gov/pubs/sp/800/52/r2/final"}
  CWE-326:
    - {framework: "OWASP Top 10 2021", ref: "A02:2021 Cryptographic Failures", url: "https://owasp.org/Top10/A02_2021-Cryptographic_Failures/"}
