# ATIVO — runner + parser + testes (CVEs em imagens/dependências/filesystem).
name: trivy
category: blue
subcategory: supply-chain
capabilities: [dependency_scan]
supported_perspectives: [external, internal]
tool: trivy
roadmap: false
enabled_by_default: true
description: >-
  Scanner de vulnerabilidades de imagens de container, filesystems e repositórios
  (Trivy). Alvo = imagem (ex.: nginx:1.25), diretório ou repo — não uma URL viva.
version_source: "trivy --version  # VERIFICAR"
license: Apache-2.0
commercial_use: ok
install_hint: "https://github.com/aquasecurity/trivy"
impact_class: passive
selection:
  speed: low
  accuracy: high
