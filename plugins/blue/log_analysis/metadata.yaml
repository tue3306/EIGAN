# Plugin REAL (Blue) — análise defensiva de logs, nativa em Python (sem binário).
name: log-analysis
category: blue
subcategory: blue
capabilities: [log_analysis]
supported_perspectives: [internal]
tool: log-analysis
roadmap: false
enabled_by_default: true
impact_class: passive  # só LÊ logs — não toca a rede, não executa nada do log
license: Apache-2.0
commercial_use: ok
description: >-
  Análise de logs (SSH/PAM, acesso web CLF/Combined, sudo) para indicadores de
  ataque — força-bruta, exploração de app web, varredura e escalonamento —, cada
  detecção mapeada a uma técnica MITRE ATT&CK (base da correlação Purple).
selection:
  speed: high
  accuracy: medium
  resource_usage: low
