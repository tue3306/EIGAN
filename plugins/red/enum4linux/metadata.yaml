# Plugin: enum4linux — enumeração de SMB/Samba (usuários, shares, políticas).
# REGRA ANTI-INVENÇÃO (§5): license/version não são fato até confirmados na
# fonte oficial. version_source diz como resolver a versão real.
name: enum4linux
category: red
subcategory: network
capabilities: [smb_enumeration]
supported_perspectives: [internal, external]
tool: enum4linux
description: >-
  Enumeração de serviços SMB/Samba (Windows e Samba em Linux): usuários, grupos,
  compartilhamentos, política de senha e informação de domínio via null session.
  Disparado pela cascata quando o nmap/naabu encontra a porta 445/139 aberta —
  exatamente o "achou Samba → roda o próximo passo focado em Samba".
version_source: "enum4linux -h  # VERIFICAR"
license: VERIFICAR          # GPLv2 (enum4linux) — confirmar na fonte oficial
commercial_use: verify
requires_credentials: false
enabled_by_default: true
install_hint: "sudo apt install enum4linux  ·  https://github.com/CiscoCXSecurity/enum4linux"

selection:
  speed: medium
  accuracy: high
  resource_usage: low
  preferred_when: [internal, smb]

# Classe de destrutividade (ADR-0011) — usada pelo Policy Engine.
impact_class: active_safe

# Cascata (ADR-0004): ao achar shares graváveis/expostos, sugere a próxima onda.
triggers_on:
  - title_contains: ["writable", "gravável", "guest"]
    then_execute: [nmap-nse]
    reason: "share SMB exposto/gravável → varredura de vuln SMB via NSE (nmap)"
