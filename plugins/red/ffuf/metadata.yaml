# ATIVO — runner + parser + testes implementados (descoberta de conteúdo web).
name: ffuf
category: red
subcategory: web
capabilities: [param_discovery]
supported_perspectives: [external, internal]
tool: ffuf
roadmap: false
enabled_by_default: true
description: >-
  Descoberta de conteúdo/diretórios/arquivos ocultos por fuzzing (ffuf). Revela
  endpoints não linkados (admin, backups, .git, APIs) que ampliam a superfície de
  ataque. Usa uma wordlist do sistema (dirb/seclists) ou a wordlist embutida.
version_source: "ffuf -V  # VERIFICAR"
license: MIT
commercial_use: ok
requires_credentials: false
enabled_by_default: true
install_hint: "sudo apt install ffuf  ·  https://github.com/ffuf/ffuf"
# Fuzzing envia MUITAS requisições → classe intrusiva (Policy Engine arbitra).
impact_class: active_intrusive
selection:
  speed: medium
  accuracy: high
  resource_usage: medium
# Cascata: um painel de login/admin descoberto orienta validação (gated).
triggers_on:
  - title_contains: ["admin", "login", ".git", "backup"]
    then_execute: [vuln_template_scan]
    reason: "Endpoint sensível descoberto → templates de vulnerabilidade direcionados"
