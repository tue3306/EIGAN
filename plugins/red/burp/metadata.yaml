# SCAFFOLD HONESTO (roadmap) — ferramenta PAGA/GUI, NÃO automatizada pelo agente.
# Declarada honestamente (§3.6): aparece no catálogo e no `doctor`, mas nunca
# executa. Burp Suite Professional é comercial e centrado em GUI; a integração
# headless exige licença + Enterprise/REST API. O EIGAN a declara (com o que ela
# precisaria) sem fingir que roda.
name: burp
category: red
subcategory: web
capabilities: [web_server_scan]
supported_perspectives: [external, internal]
tool: burpsuite
roadmap: true
enabled_by_default: false
licensing: paid
description: >-
  Burp Suite Professional/Enterprise — DAST de aplicação web (scanner ativo).
  Comercial e centrado em GUI; a automação headless requer LICENÇA + a REST API
  do Burp Suite Enterprise (ou a Extender API). O agente NÃO a automatiza: ela é
  declarada para transparência de cobertura (§3.6), nunca executada.
install_hint: "Licença comercial — https://portswigger.net/burp (Pro/Enterprise)"
credentials:
  - env: BURP_API_KEY
    label: Burp Suite Enterprise API Key (+ licença)
    required: true
    obtain_url: "https://portswigger.net/burp/documentation/enterprise/api-documentation"
    degrades: "ferramenta PAGA/GUI — sem licença + API Enterprise, não é automatizável"
impact_class: active_intrusive
