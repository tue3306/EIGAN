# Plugin REAL (Red) — prober de exposição/segredos vazados, nativo em Python.
name: exposure
category: red
subcategory: web
capabilities: [secrets_exposure]
supported_perspectives: [external, internal]
tool: exposure
roadmap: false
enabled_by_default: true
impact_class: active_safe  # só GETs de identificação de recursos públicos
license: Apache-2.0
commercial_use: ok
description: >-
  Sonda arquivos e segredos VAZADOS numa app web (.git/.env/backups/.aws/chaves
  privadas/server-status/phpinfo) e segredos embutidos nas respostas (chaves
  AWS/Google/Slack/GitHub, private keys) — confirmados por assinatura de conteúdo,
  mapeados a CWE + MITRE ATT&CK (T1552/T1592). Grounded: só reporta o que o alvo
  realmente serve; segredos são mascarados na evidência.
selection:
  speed: high
  accuracy: high
  resource_usage: low
  preferred_when: [http, web]
# Cascata: quando um serviço web vivo é confirmado, sonda exposição/segredos.
triggers_on:
  - service: [http, https]
    then_execute: exposure
    reason: "serviço web vivo — sondar arquivos/segredos vazados (.git/.env/backup)"
  - port: [80, 443, 8080, 8443, 8000, 8888]
    then_execute: exposure
    reason: "porta web aberta — sondar exposição de arquivos/segredos"
