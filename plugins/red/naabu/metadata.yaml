# Plugin: naabu — descoberta rápida de portas (antes do nmap).
name: naabu
category: red
subcategory: network
capabilities: [port_discovery]
supported_perspectives: [external, internal]
tool: naabu
description: >-
  Descoberta rápida de portas abertas (ProjectDiscovery). Roda antes do nmap,
  que faz service/version nas portas encontradas.
version_source: "naabu -version  # VERIFICAR"
license: VERIFICAR          # provável MIT (ProjectDiscovery) — confirmar na fonte
commercial_use: verify
requires_credentials: false
chained_after: [dns_resolution]
enabled_by_default: true
install_hint: "https://github.com/projectdiscovery/naabu#installation"

# Sinais de seleção (ADR-0007) — heurística de tuning NOSSA, não benchmark. Rápido
# e leve: preferido para varredura ampla de portas; o nmap ganha quando o modo
# pede precisão/serviço.
selection:
  speed: high
  accuracy: medium
  resource_usage: low
  preferred_when: [external, http]
  avoid_when: [low_bandwidth]

# Cascata (ADR-0004): naabu só sabe que a porta está aberta; encaminha para o
# nmap fazer service/version, que então dispara as cascatas específicas.
triggers_on:
  - port: [80, 443, 8080, 8443, 8000]
    then_execute: [httpx]
    reason: "porta web aberta → confirmar serviço HTTP vivo (httpx)"
  - then_execute: [nmap]
    reason: "porta aberta → detecção de serviço/versão (nmap -sV)"
