# Plugin: nuclei — scanner de vulnerabilidades por templates.
name: nuclei
category: red
subcategory: web
capabilities: [vuln_template_scan]
supported_perspectives: [external, internal]
tool: nuclei
description: >-
  Scanner de vulnerabilidades dirigido por templates (ProjectDiscovery). Peça
  central do engine. CVE/CVSS vindos do template são EVIDÊNCIA, não fato
  enriquecido — a confirmação contra NVD/OSV é de outra camada (Risk Engine).
version_source: "nuclei -version  # VERIFICAR"
license: VERIFICAR          # provável MIT (ProjectDiscovery) — confirmar na fonte
commercial_use: verify
requires_credentials: false
chained_after: [web_probe]
enabled_by_default: true
install_hint: "https://github.com/projectdiscovery/nuclei#installation"

# Sinais de seleção (ADR-0007) — heurística de tuning NOSSA, não benchmark.
selection:
  speed: medium
  accuracy: high
  resource_usage: medium
  preferred_when: [http]

# Cascata (ADR-0004): um finding crítico/alto pode justificar validação de
# exploração. A validação é gated: só roda se autorizada explicitamente e em modo
# "validar" — nunca dispara exploit por conta própria.
triggers_on:
  - severity_min: high
    then_execute: [exploit_validation]
    reason: "vulnerabilidade alta/crítica confirmada por template → validação de PoC (gated)"
  - title_contains: ["cve-"]
    then_execute: [cve_enrich]
    reason: "CVE referenciado no template → enriquecimento EPSS/KEV (fonte oficial)"

# Classe de destrutividade (ADR-0011) — usada pelo Policy Engine.
impact_class: active_safe
