# Plugin: subfinder — enumeração passiva de subdomínio (OSINT).
# REGRA ANTI-INVENÇÃO (§5): license/version não são fato até confirmados na
# fonte oficial. version_source diz como resolver a versão real.
name: subfinder
category: red
subcategory: recon
capabilities: [subdomain_enumeration]
supported_perspectives: [external]   # dentro da rede não há OSINT de subdomínio
tool: subfinder
description: >-
  Enumeração passiva de subdomínios via múltiplas fontes OSINT (ProjectDiscovery).
  Alimenta o inventário de assets; não gera Finding de vulnerabilidade.
version_source: "subfinder -version  # VERIFICAR"
license: VERIFICAR          # provável MIT (ProjectDiscovery) — confirmar na fonte
commercial_use: verify
licensing: api_key
# subfinder lê estas fontes de ~/.config/subfinder/provider-config.yaml. Sem elas,
# roda só com fontes públicas anônimas → acha uma FRAÇÃO dos subdomínios. O menu
# "Chaves de ferramentas" gera/atualiza esse arquivo a partir das env vars abaixo.
credentials:
  - env: SHODAN_API_KEY
    label: Shodan
    provider: shodan
    required: false
    obtain_url: "https://account.shodan.io/"
    degrades: "sem Shodan, menos subdomínios via DNS/infra passiva"
  - env: CENSYS_API_KEY
    label: Censys (formato APIID:SECRET)
    provider: censys
    required: false
    obtain_url: "https://search.censys.io/account/api"
    degrades: "sem Censys, menos subdomínios via certificados/infra"
  - env: VIRUSTOTAL_API_KEY
    label: VirusTotal
    provider: virustotal
    required: false
    obtain_url: "https://www.virustotal.com/gui/my-apikey"
    degrades: "sem VirusTotal, menos subdomínios via relações passivas"
  - env: SECURITYTRAILS_API_KEY
    label: SecurityTrails
    provider: securitytrails
    required: false
    obtain_url: "https://securitytrails.com/app/account/credentials"
    degrades: "sem SecurityTrails, menos subdomínios via DNS histórico"
chained_after: []
enabled_by_default: true
install_hint: "https://github.com/projectdiscovery/subfinder#installation"

# Sinais de seleção (ADR-0007) — heurística de tuning NOSSA, não benchmark.
selection:
  speed: high
  accuracy: medium
  resource_usage: low
  preferred_when: [external]

# Cascata (ADR-0004): subdomínio encontrado → resolver antes de sondar.
triggers_on:
  - source_tool: [subfinder]
    then_execute: [dnsx]
    reason: "subdomínio descoberto → resolução DNS antes de sondar portas/web"

# Classe de destrutividade (ADR-0011) — usada pelo Policy Engine.
impact_class: passive
