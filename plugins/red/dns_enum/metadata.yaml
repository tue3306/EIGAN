# Plugin: dns-enum — enumeração de DNS (registros + zone transfer AXFR).
name: dns-enum
category: red
subcategory: recon
capabilities: [dns_enumeration]
supported_perspectives: [external, internal]
tool: dig
description: >-
  Enumeração de DNS com o dig: registros SOA/NS/MX/TXT/SRV e TENTATIVA de zone
  transfer (AXFR) contra cada nameserver. AXFR permitido expõe a zona inteira
  (todo o mapa de hosts) — misconfiguração séria (CWE-200). Recon avançada que
  alimenta o inventário e a expansão de alvos (ADR-0018).
version_source: "dig -v  # VERIFICAR"
license: VERIFICAR          # dig faz parte do BIND (ISC/MPL-2.0) — confirmar na fonte
commercial_use: verify
requires_credentials: false
chained_after: [subdomain_enumeration]
enabled_by_default: true
install_hint: "pacote 'dnsutils' (Debian/Ubuntu/Kali) ou 'bind-utils' (RHEL)"

# Sinais de seleção (ADR-0007) — heurística NOSSA, não benchmark.
selection:
  speed: high
  accuracy: high
  resource_usage: low

# Cascata (ADR-0004): não dispara outras ferramentas por si — é parte da recon.
triggers_on: []

# Classe de destrutividade (ADR-0011): consultas DNS read-only (inclusive AXFR,
# que é uma query legítima do protocolo). Ativa mas segura — nada é modificado.
impact_class: active_safe
