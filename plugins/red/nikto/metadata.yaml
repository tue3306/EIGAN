# ATIVO — runner + parser + testes implementados (scanner de servidor web).
name: nikto
category: red
subcategory: web
capabilities: [web_server_scan]
supported_perspectives: [external, internal]
tool: nikto
roadmap: false
enabled_by_default: true
description: >-
  Scanner de servidor web (nikto): arquivos/CGIs perigosos, configurações
  inseguras, cabeçalhos ausentes, versões desatualizadas e milhares de checagens
  conhecidas. Complementa o nuclei com a base histórica do nikto.
version_source: "nikto -Version  # VERIFICAR"
license: GPL-2.0
commercial_use: verify
install_hint: "sudo apt install nikto  ·  https://github.com/sullo/nikto"
# Envia muitas requisições de sonda → intrusivo (Policy Engine arbitra).
impact_class: active_intrusive
selection:
  speed: low
  accuracy: medium
  resource_usage: medium
