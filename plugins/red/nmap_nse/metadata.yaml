# Plugin: nmap-nse — 2ª onda do nmap com NSE (scripts de vulnerabilidade).
# É o "voltar para o mesmo nmap e rodar outro escaneamento diferente": quando um
# serviço é descoberto, a cascata dispara o nmap DE NOVO, agora com --script para
# aprofundar (default + vuln + scripts do serviço).
name: nmap-nse
category: red
subcategory: network
capabilities: [nse_vuln_scan]
supported_perspectives: [external, internal]
tool: nmap
description: >-
  Segunda passada do nmap dirigida pela descoberta: roda a Nmap Scripting Engine
  (NSE) — categorias default/vuln e scripts por serviço (smb-vuln-*, http-*,
  ssl-*) — para transformar "porta aberta" em "vulnerabilidade candidata".
version_source: "nmap --version  # VERIFICAR"
license: VERIFICAR          # NPSL (derivada de GPLv2) — confirmar
commercial_use: verify
requires_credentials: false
enabled_by_default: true
install_hint: "sudo apt install nmap  ·  https://nmap.org/book/nse.html"

selection:
  speed: low
  accuracy: high
  resource_usage: medium
  preferred_when: [internal]

# NSE (categoria vuln) pode ser intrusivo → classe mais alta (Policy Engine).
impact_class: active_intrusive

# Cascata: um script confirmando VULNERABLE alimenta a validação de PoC (gated).
triggers_on:
  - title_contains: ["vulnerable", "vulnerável", "cve-"]
    then_execute: [exploitation]
    reason: "NSE confirmou serviço vulnerável → validação de PoC autorizada (gated)"
