# ATIVO — runner + parser + testes (scanner dedicado de WordPress).
name: wpscan
category: red
subcategory: web
capabilities: [cms_scan]
supported_perspectives: [external, internal]
tool: wpscan
roadmap: false
enabled_by_default: true
description: >-
  Scanner dedicado de WordPress: plugins/temas/usuários e vulnerabilidades
  conhecidas. Requer WordPress detectado (por httpx/whatweb) — cascata.
install_hint: "sudo apt install wpscan  ·  https://wpscan.com/"
licensing: api_key
credentials:
  - env: WPSCAN_API_TOKEN
    label: WPScan API Token
    required: false
    obtain_url: "https://wpscan.com/api"
    degrades: >-
      sem o token, a enumeração (versão/plugins/temas/usuários) roda, mas as CVEs
      conhecidas de plugins/temas NÃO são consultadas no feed da WPScan
impact_class: active_safe
selection:
  speed: low
  accuracy: high
  resource_usage: medium
  preferred_when: [wordpress]
