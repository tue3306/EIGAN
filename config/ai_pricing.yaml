# config/ai_pricing.yaml — preços de LLM para o cálculo de CUSTO de execução.
#
# ┌────────────────────────────────────────────────────────────────────────────┐
# │ O EIGAN NÃO EMBUTE PREÇOS. Preço de LLM é dado factual que muda (varia por   │
# │ provedor/modelo/contrato/região). Pela regra de veracidade (§2) e anti-       │
# │ invenção (§3.1/§5), você declara aqui APENAS os preços que confirmou na       │
# │ fonte oficial do provedor, marcando `verified: true`.                        │
# │                                                                              │
# │ Sem uma entrada `verified: true` para um modelo, o EIGAN reporta os TOKENS   │
# │ reais e marca o custo como UNVERIFIED — nunca estima um valor.               │
# └────────────────────────────────────────────────────────────────────────────┘
#
# Formato de cada entrada (chave = id do modelo, igual ao enviado ao provedor):
#
#   models:
#     <model-id>:
#       input_per_1k:  <preço por 1.000 tokens de ENTRADA>   # número
#       output_per_1k: <preço por 1.000 tokens de SAÍDA>     # número
#       currency: USD                                         # ISO 4217
#       source: "<URL da tabela de preços oficial onde você conferiu>"
#       verified: true                                        # só true habilita o cálculo
#
# Exemplo (VALORES FICTÍCIOS — não use; preencha com o que você verificou):
#
#   models:
#     exemplo-modelo:
#       input_per_1k: 0.0
#       output_per_1k: 0.0
#       currency: USD
#       source: "https://provedor.exemplo/pricing"
#       verified: false   # false → continua UNVERIFIED (o exemplo não vira custo real)

models: {}
