# ───────────── CORTADAS por redundância (fora do pipeline padrão) ─────────────
# Interface preservada se houver adapter; apenas não entram por padrão.
retired:
  rustscan:      { replaced_by: naabu,       reason: "redundante com naabu" }
  gobuster:      { replaced_by: [ffuf, feroxbuster], reason: "coberto por ffuf+feroxbuster" }
  dirsearch:     { replaced_by: [ffuf, feroxbuster], reason: "coberto por ffuf+feroxbuster" }
  httprobe:      { replaced_by: httpx,       reason: "substituído por httpx" }
  waybackurls:   { replaced_by: gau,         reason: "subconjunto de gau" }
  assetfinder:   { replaced_by: subfinder,   reason: "redundante com subfinder" }
  hakrawler:     { replaced_by: katana,      reason: "sobreposto por katana" }
  wappalyzer_cli:
    replaced_by: [httpx, whatweb]
    reason: "⚠️ status OSS incerto (possivelmente descontinuado/comercial) — VERIFICAR; não criar dependência"

# ───────────── TROCADAS por abandono (⚠️ confirmar status atual) ──────────────
swapped:
  xsstrike: { by: dalfox,  reason: "⚠️ XSStrike parado; dalfox mantido — VERIFICAR" }
  tplmap:   { by: sstimap, reason: "⚠️ Tplmap Python2/abandonado; SSTImap ativo — VERIFICAR" }

# Fontes de enriquecimento de CVE (consultadas com cache; nunca inventadas):
cve_feeds:
