# Catálogo declarativo do arsenal (arsenal consolidado — Parte 2/6).
#
# REGRA ANTI-INVENÇÃO (CLAUDE.md §5): versões, status de manutenção e licenças
# NÃO são fixados de memória. license/commercial_use marcados "VERIFICAR"/"verify"
# devem ser confirmados na fonte oficial antes do release. version_source diz
# como resolver a versão real. Nada aqui é fato até verificado.
#
# Campos por ferramenta:
#   category            — família funcional
#   role_in_pipeline    — papel no encadeamento
#   supported_perspectives — [external] | [internal] | [external, internal]
#   requires_credentials— scan autenticado?
#   version_source      — como obter a versão (# VERIFICAR)
#   license             — licença declarada (VERIFICAR até confirmar)
#   commercial_use      — ok | verify | restricted
#   chained_after       — dependências no pipe (o que roda antes)
#   enabled_by_default  — entra no pipeline padrão?
#   note                — decisão de consolidação / pendência ⚠️

tools:
  # ───────────────────────── Descoberta host/porta ─────────────────────────
  naabu:
    category: port-discovery
    role_in_pipeline: "descoberta rápida de portas (antes do nmap)"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "naabu -version  # VERIFICAR"
    license: VERIFICAR            # MIT (projectdiscovery) — confirmar
    commercial_use: verify
    chained_after: [dnsx]
    enabled_by_default: true
  nmap:
    category: port-service
    role_in_pipeline: "service/version + NSE nas portas abertas; host-discovery interno"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "nmap --version  # VERIFICAR"
    license: VERIFICAR            # NPSL (deriva de GPLv2, com restrições) — confirmar
    commercial_use: verify
    chained_after: [naabu]
    enabled_by_default: true
  masscan:
    category: port-discovery
    role_in_pipeline: "varredura de faixas muito grandes"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "masscan --version  # VERIFICAR"
    license: VERIFICAR            # AGPL-3.0 — confirmar
    commercial_use: verify
    enabled_by_default: false      # opcional: só faixas grandes

  # ─────────────────────── Web vivo / fingerprint / WAF ──────────────────────
  httpx:
    category: web-probe
    role_in_pipeline: "probe HTTP + tech-detect (feed de inventário)"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "httpx -version  # VERIFICAR (ProjectDiscovery, não o cliente Python)"
    license: VERIFICAR            # MIT (projectdiscovery) — confirmar
    commercial_use: verify
    chained_after: [dnsx, naabu]
    enabled_by_default: true
    note: "⚠️ homônimo do cliente httpx do Python — adapter faz guard de identidade."
  whatweb:
    category: fingerprint
    role_in_pipeline: "fingerprint de tecnologias (complemento ao httpx)"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "whatweb --version  # VERIFICAR"
    license: VERIFICAR            # GPL — confirmar
    commercial_use: verify
    chained_after: [httpx]
    enabled_by_default: true
  wafw00f:
    category: waf-detect
    role_in_pipeline: "detecção de WAF"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "wafw00f --version  # VERIFICAR"
    license: VERIFICAR
    commercial_use: verify
    chained_after: [httpx]
    enabled_by_default: true

  # ───────────────────────── Resolução / validação ──────────────────────────
  dnsx:
    category: dns-resolve
    role_in_pipeline: "valida hosts/subdomínios vivos entre enumeração e httpx"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "dnsx -version  # VERIFICAR"
    license: VERIFICAR            # MIT (projectdiscovery) — confirmar
    commercial_use: verify
    chained_after: [subfinder, amass]
    enabled_by_default: true
    note: "ADICIONADO — elo que faltava no pipe."

  # ───────────────────────── Subdomínio (só EXTERNAL) ───────────────────────
  subfinder:
    category: subdomain-passive
    role_in_pipeline: "enumeração passiva de subdomínio (OSINT)"
    supported_perspectives: [external]
    requires_credentials: false
    version_source: "subfinder -version  # VERIFICAR"
    license: VERIFICAR            # MIT (projectdiscovery) — confirmar
    commercial_use: verify
    enabled_by_default: true
  amass:
    category: subdomain-deep
    role_in_pipeline: "enumeração profunda de subdomínio"
    supported_perspectives: [external]
    requires_credentials: false
    version_source: "amass -version  # VERIFICAR"
    license: VERIFICAR            # Apache-2.0 (OWASP) — confirmar
    commercial_use: verify
    enabled_by_default: true

  # ───────────────────────── Crawling / URLs / params ───────────────────────
  katana:
    category: crawler
    role_in_pipeline: "crawler ativo"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "katana -version  # VERIFICAR"
    license: VERIFICAR
    commercial_use: verify
    chained_after: [httpx]
    enabled_by_default: true
  gau:
    category: url-history
    role_in_pipeline: "URLs históricas (supera waybackurls)"
    supported_perspectives: [external]
    requires_credentials: false
    version_source: "gau --version  # VERIFICAR"
    license: VERIFICAR
    commercial_use: verify
    enabled_by_default: true
  gf:
    category: pattern-filter
    role_in_pipeline: "filtra candidatos por padrão"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "# VERIFICAR (gf não versiona formalmente)"
    license: VERIFICAR
    commercial_use: verify
    chained_after: [gau, katana]
    enabled_by_default: true
  arjun:
    category: param-discovery
    role_in_pipeline: "descoberta de parâmetros ocultos"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "arjun --version  # VERIFICAR"
    license: VERIFICAR
    commercial_use: verify
    chained_after: [katana]
    enabled_by_default: true
  gxss:
    category: param-reflection
    role_in_pipeline: "detecção de reflexão (candidatos a XSS)"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "# VERIFICAR"
    license: VERIFICAR
    commercial_use: verify
    chained_after: [arjun]
    enabled_by_default: true

  # ───────────────────────── Conteúdo / diretórios ──────────────────────────
  ffuf:
    category: fuzzing
    role_in_pipeline: "fuzzing flexível de conteúdo/dir"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "ffuf -V  # VERIFICAR"
    license: VERIFICAR            # MIT — confirmar
    commercial_use: verify
    enabled_by_default: true
  feroxbuster:
    category: content-recursive
    role_in_pipeline: "brute force recursivo de conteúdo"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "feroxbuster --version  # VERIFICAR"
    license: VERIFICAR            # MIT — confirmar
    commercial_use: verify
    enabled_by_default: true

  # ─────────────────────── Templates / injeção / classe ─────────────────────
  nuclei:
    category: vuln-templates
    role_in_pipeline: "scanner por templates (peça central)"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "nuclei -version  # VERIFICAR"
    license: VERIFICAR            # MIT (projectdiscovery) — confirmar
    commercial_use: verify
    chained_after: [httpx, katana]
    enabled_by_default: true
  sqlmap:
    category: injection-sql
    role_in_pipeline: "injeção SQL (só com confirmação explícita do operador)"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "sqlmap --version  # VERIFICAR"
    license: VERIFICAR            # GPLv2 — confirmar
    commercial_use: verify
    chained_after: [arjun]
    enabled_by_default: false      # ativo destrutivo: opt-in
  dalfox:
    category: injection-xss
    role_in_pipeline: "XSS (substitui XSStrike)"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "dalfox version  # VERIFICAR"
    license: VERIFICAR            # MIT — confirmar
    commercial_use: verify
    chained_after: [gxss]
    enabled_by_default: true
    note: "TROCA: XSStrike (⚠️ parado) → dalfox (mantido). Confirmar status."
  crlfuzz:
    category: injection-crlf
    role_in_pipeline: "CRLF injection"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "crlfuzz -version  # VERIFICAR"
    license: VERIFICAR
    commercial_use: verify
    enabled_by_default: true
  corsy:
    category: cors
    role_in_pipeline: "misconfig de CORS"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "# VERIFICAR"
    license: VERIFICAR
    commercial_use: verify
    enabled_by_default: true
  ssrfmap:
    category: ssrf
    role_in_pipeline: "SSRF"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "# VERIFICAR"
    license: VERIFICAR
    commercial_use: verify
    chained_after: [arjun]
    enabled_by_default: true
  sstimap:
    category: ssti
    role_in_pipeline: "SSTI (substitui Tplmap)"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "# VERIFICAR"
    license: VERIFICAR
    commercial_use: verify
    enabled_by_default: true
    note: "TROCA: Tplmap (⚠️ Python2/abandonado) → SSTImap. Confirmar status."
  jwt_tool:
    category: jwt
    role_in_pipeline: "análise/ataque de JWT"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "# VERIFICAR"
    license: VERIFICAR
    commercial_use: verify
    enabled_by_default: true

  # ─────────────────────────────── CMS ──────────────────────────────────────
  cmseek:
    category: cms-dispatch
    role_in_pipeline: "detecta o CMS e despacha o scanner específico"
    supported_perspectives: [external, internal]
    requires_credentials: false
    version_source: "# VERIFICAR"
    license: VERIFICAR
