# Perfis de scan. O perfil RESTRINGE quais estágios do pipeline da perspectiva
# rodam (ver engine/pipeline.py::PROFILE_STAGES e stages_for). A seleção de
# ferramentas vem do pipeline por perspectiva (EXTERNAL/INTERNAL), não daqui —
# este arquivo é a descrição legível da política; a fonte executável é o código.

profiles:
  quick:
    description: "Só descoberta (subdomínio/resolução/portas ou host-discovery)."
    stages: [subdomain, resolve, ports, host-discovery]
  standard:
    description: "Pipeline completo da perspectiva."
    stages: null   # null = todos os estágios aplicáveis à perspectiva
  deep:
    description: "Completo + NSE/scripts mais agressivos."
    stages: null
  web-only:
    description: "Apenas cadeia web (probe → crawl → params → templates → cms → tls)."
    stages: [web-probe, screenshot, crawl, params, vuln-templates, cms, tls]
  network-only:
    description: "Apenas rede (host-discovery, resolução, portas, serviço, tls)."
    stages: [host-discovery, resolve, ports, service-auth, tls]

# Rate limit padrão NÃO fica aqui: é definido pelo perfil de PERSPECTIVA
# (perspective.py::_PROFILES) — conservador em EXTERNAL, agressivo em INTERNAL —
# e pode ser sobreposto por --rate-limit / tool_opts.
