name: publish

# Publica o EIGAN no PyPI via TRUSTED PUBLISHING (OIDC) quando um GitHub
# Release é publicado — NÃO usa token/segredo: a identidade vem do OIDC do
# próprio Actions (§5: nunca segredo no repo).
#
# INERTE por padrão. O passo de `publish` só roda quando o dono liga a
# variável de repositório `PYPI_TRUSTED_PUBLISHER = true` (Settings → Secrets
# and variables → Actions → Variables). Enquanto ela não estiver ligada, o job
# `publish` é PULADO (não falha) e o Release NÃO gera "Failed to deploy".
#
# Para habilitar a publicação (uma vez, do lado do dono):
#   1. Registrar/possuir o projeto `eigan` no PyPI (https://pypi.org).
#   2. Em PyPI → Manage → Publishing, adicionar um *trusted publisher* com:
#        Owner:        tue3306
#        Repository:   EIGAN
#        Workflow:     publish.yml
#        Environment:  pypi
#   3. Criar a variável de repositório `PYPI_TRUSTED_PUBLISHER = true`.
# Ver docs/BLOCKERS.md #5 e ADR-0006.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    # Só publica quando o dono configurou o trusted publisher no PyPI e ligou
    # esta variável. Sem ela, o job é pulado (o Release não falha o deploy).
    if: ${{ vars.PYPI_TRUSTED_PUBLISHER == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC para trusted publishing (sem token)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
