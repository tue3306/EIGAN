name: publish

# Publica o VulnForge no PyPI via TRUSTED PUBLISHING (OIDC) quando um GitHub
# Release é publicado — NÃO usa token/segredo: a identidade vem do OIDC do
# próprio Actions (§5: nunca segredo no repo).
#
# INERTE até o dono (1) registrar o projeto `vulnforge` no PyPI e (2) configurar
# o *trusted publisher* apontando para este repositório + workflow `publish.yml`
# + environment `pypi`. Enquanto não configurado, o passo de publish falha de
# propósito (sem credencial) e não vaza nada. Ver docs/BLOCKERS.md #5 e ADR-0006.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC para trusted publishing (sem token)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
