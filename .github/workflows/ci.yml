name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Type-check
        run: mypy src || true   # não-bloqueante nesta fase
      - name: Tests
        run: pytest -q --cov=vulnforge --cov-report=term-missing

  # Exemplo de gate de segurança em CI: o próprio VulnForge falha o pipeline se
  # houver findings acima do limiar (contra um alvo de teste LOCAL autorizado).
  # Descomente e forneça um scope.yaml + alvo local vulnerável (DVWA/Juice Shop).
