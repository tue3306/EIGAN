# docker compose up  → sobe a API + dashboard.
# O banco default é SQLite em volume; para Postgres, defina DATABASE_URL e
# adicione um serviço `db` (Repository Pattern já desacopla o store).
services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - eigan_data:/app/data
    environment:
      # Chaves de IA são OPCIONAIS — sem elas o produto funciona por fallback.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    # Sandbox: acesso ao socket Docker só se você optar por rodar ferramentas
    # em containers efêmeros. Comentado por padrão (menor privilégio).
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock

volumes:
  eigan_data:
